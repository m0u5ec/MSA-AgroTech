name: Generate PlantUML Diagrams

on:
  push:
    branches:
      - main # Укажите вашу основную ветку (main или master)

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Разрешаем экшену пушить изменения в репозиторий

    steps:
      # 1. Скачиваем код репозитория
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 2. Запускаем экшен, который найдет комментарии и сгенерирует картинки
      - name: Render PlantUML
        uses: cloudogu/plantuml-for-markdown-action@v1.2.1

      # 3. Фиксируем изменения и отправляем их обратно в репозиторий
      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "auto: render plantuml diagrams [skip ci]"
